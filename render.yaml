# Render Blueprint for the IPI backend (Express + Supabase).
# In Render: New → Blueprint → connect this repo → it reads this file.
# Then fill in the secret env vars marked `sync: false`.
services:
  - type: web
    name: ipi-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: cvs
      - key: CLIENT_ORIGIN
        sync: false
